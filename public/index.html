<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Wiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        .prose h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 1rem; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .prose h2 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .prose p { margin-bottom: 1rem; line-height: 1.6; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .prose li { margin-bottom: 0.25rem; }
        .prose a { color: #0366d6; text-decoration: none; }
        .prose a:hover { text-decoration: underline; }
        
        .tree-node { cursor: pointer; user-select: none; }
        .tree-children { margin-left: 1.25rem; display: none; }
        .tree-children.open { display: block; }
        .folder-icon::before { content: '📁 '; }
        .folder-icon.open::before { content: '📂 '; }
        .file-icon::before { content: '📄 '; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-200">
                <h1 class="text-xl font-bold text-gray-800 mb-4">📚 Local Wiki</h1>
                <input type="text" id="search" placeholder="Search pages..." 
                       class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <nav id="sidebar" class="flex-1 overflow-y-auto p-4 space-y-1">
                <!-- Page links will be injected here -->
                <div class="text-sm text-gray-500 italic">Loading pages...</div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-white">
            <div id="content" class="max-w-4xl mx-auto p-8 prose">
                <div class="text-center text-gray-500 mt-20">
                    <p class="text-lg">문서를 선택해주세요.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
