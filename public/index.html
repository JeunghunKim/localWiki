<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Wiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        .prose h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 1rem; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .prose h2 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .prose p { margin-bottom: 1rem; line-height: 1.6; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .prose li { margin-bottom: 0.25rem; }
        .prose a { color: #0366d6; text-decoration: none; }
        .prose a:hover { text-decoration: underline; }
        
        .tree-node { cursor: pointer; user-select: none; }
        .tree-children { margin-left: 1.25rem; display: none; }
        .tree-children.open { display: block; }
        .folder-icon::before { content: '📁 '; }
        .folder-icon.open::before { content: '📂 '; }
        .file-icon::before { content: '📄 '; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-hidden">
    <!-- Mobile Header -->
    <header class="lg:hidden bg-white border-b border-gray-200 p-4 flex items-center justify-between sticky top-0 z-30">
        <h1 class="text-lg font-bold text-gray-800">📚 Local Wiki</h1>
        <button id="menu-toggle" class="p-2 text-gray-600 hover:bg-gray-100 rounded-md transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </header>

    <div class="flex h-screen overflow-hidden relative">
        <!-- Backdrop for mobile -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden lg:hidden transition-opacity"></div>

        <!-- Sidebar -->
        <aside id="sidebar-container" class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 flex flex-col transform -translate-x-full transition-transform duration-300 ease-in-out lg:relative lg:translate-x-0">
            <div class="p-4 border-b border-gray-200 flex items-center justify-between">
                <h1 class="text-xl font-bold text-gray-800 mb-4">📚 Local Wiki</h1>
                <button id="close-menu" class="lg:hidden p-2 text-gray-500 hover:text-gray-800">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="px-4 pb-4">
                <input type="text" id="search" placeholder="Search pages..." 
                       class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <nav id="sidebar" class="flex-1 overflow-y-auto p-4 pt-0 space-y-1">
                <!-- Page links will be injected here -->
                <div class="text-sm text-gray-500 italic">Loading pages...</div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-white">
            <div id="content" class="max-w-4xl mx-auto p-4 md:p-8 prose">
                <div class="text-center text-gray-500 mt-20">
                    <p class="text-lg">문서를 선택해주세요.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
